/**
 *    __   _______  _____   __     _____ _____ _   _ _   _ _____ _____ _____ ___________
 *    \ \ / | ___ \/ _ \ \ / /    /  __ |  _  | \ | | \ | |  ___/  __ |_   _|  _  | ___ \
 *     \ V /| |_/ / /_\ \ V ______| /  \| | | |  \| |  \| | |__ | /  \/ | | | | | | |_/ /
 *     /   \|    /|  _  |\ |______| |   | | | | . ` | . ` |  __|| |     | | | | | |    /
 *    / /^\ | |\ \| | | || |      | \__/\ \_/ | |\  | |\  | |___| \__/\ | | \ \_/ | |\ \
 *    \/   \\_| \_\_| |_/\_/       \____/\___/\_| \_\_| \_\____/ \____/ \_/  \___/\_| \_|
 *
 * Prerequisite:
 *  - 'xray-connector/package.json' (npm) xray-connector project integration in the root directory
 *
 *  - Apply 'gradle-node-plugin'(https://github.com/node-gradle/gradle-node-plugin)
 *
 *  - Configure Artifactory as described here: https://gitlabee.dt.renault.com/shared/components/quality/xray-connector
 *    -> Backup your existing .npmrc file, if any:
 *        $ [ -f $HOME/.npmrc ] && cp $HOME/.npmrc $HOME/.npmrc.bak
 *    -> Set the necessary artifactory authentication environment variables:
 *        $ export ARTIFACTORY_USERNAME=<your technical IPN>
 *        $ export ARTIFACTORY_TOKEN=<the token generated by logging in artifactory using the technical IPN>
 *    -> Generate a working copy of the `.npmrc file by executing the following command:
 *        $ curl -u $ARTIFACTORY_USERNAME:$ARTIFACTORY_TOKEN https://artifactory.dt.renault.com/artifactory/api/npm/npm-renault/auth/rd > $HOME/.npmrc
 *
 *
 * Note: Following properties MUST be provided:
 *  - xc.host: Jira host (sample: jira.dt.renault.com)
 *  - xc.login: Jira user login
 *  - xc.pwd: Jira user password
 *  - xc.test.key: 'Test', 'Test Set' or 'Test Plan' key (sample: xc.testKey=TDPTF-403)
 *  - xc.test.environment: xray test execution environment
 */
// Property names
def xcHost_pName = "xc.host";
def xcLogin_pName = "xc.login";
def xcPwd_pName = "xc.pwd";
def xcTestKey_pName = "xc.test.key";
def xcTestEnvironment_pName = "xc.test.environment";

// Path
def xcDirName = 'xray-connector'
def xcPath = "${project.getRootDir()}/$xcDirName"
//def xcFeatureDir = "src/test/resources/$xcDirName"
def xcFeatureDir = "src/test/java/api/$xcDirName"
def xcReportsDir = "build/surefire-reports"
def xcMergedReportDir = "$xcReportsDir/merged"
def xcMergedReportPath = "$xcMergedReportDir/merged-output.json"


clean {
    delete "$xcPath/node_modules"
    delete "$xcPath/package-lock.json"
    delete "${project.getRootDir()}/$xcFeatureDir"
}

task xcInstall(type: NpmTask) {

    group = 'xray-connector'
    description = 'Get cucumber .feature files from jira'

    inputs.file("$xcPath/package.json")
    outputs.dir(xcPath)

    args = ['install', '--prefix', xcDirName]
}

task xcGetFeatures(type: NpmTask) {
    group = 'xray-connector'
    description = 'Get cucumber .feature files from jira'
    dependsOn 'xcInstall'

    doFirst {
        environment = [
                'JIRA_XRAY_HOST'                : getProperty(xcHost_pName),
                'JIRA_XRAY_LOGIN'               : getProperty(xcLogin_pName),
                'JIRA_XRAY_PASSWORD'            : getProperty(xcPwd_pName),
                'XC_DEFAULT_TEST_PLAN'          : getProperty(xcTestKey_pName),
                'XC_FEATURES_DOWNLOAD_DIRECTORY': "../$xcFeatureDir"
        ]

        delete "${project.getRootDir()}/$xcFeatureDir"
    }

    args = ['run', '--prefix', xcDirName, 'xc:get-features']
}

task xcBuildReport(type: NpmTask) {
    group = 'xray-connector'
    description = 'Build merged cucumber report'
    dependsOn 'xcInstall'

    inputs.files fileTree(dir: "${project.getRootDir()}/$xcReportsDir", include: "*.json")
    outputs.file("${project.getRootDir()}/$xcMergedReportPath")

    doFirst {
        environment = [
                'XC_FEATURES_REPORT_DIRECTORY' : "../$xcReportsDir",
                'XC_MERGED_REPORT_DIRECTORY' : "../$xcMergedReportDir"
        ]
    }

    args = ['run', '--prefix', xcDirName, 'xc:build-report']
}

task xcSendReport(type: NpmTask) {
    group = 'xray-connector'
    description = 'Send cucumber report into jira'
    dependsOn 'xcInstall'

    inputs.file("${project.getRootDir()}/$xcMergedReportPath")

    doFirst {
        environment = [
                'JIRA_XRAY_HOST'            : getProperty(xcHost_pName),
                'JIRA_XRAY_LOGIN'           : getProperty(xcLogin_pName),
                'JIRA_XRAY_PASSWORD'        : getProperty(xcPwd_pName),
                'XC_DEFAULT_TEST_PLAN'      : getProperty(xcTestKey_pName),
                'XC_TEST_ENVIRONMENT'       : getProperty(xcTestEnvironment_pName),
                'XC_MERGED_REPORT_DIRECTORY': "../$xcMergedReportDir"
        ]
    }

    args = ['run', '--prefix', xcDirName, 'xc:send-report']
}

tasks.test.finalizedBy("xcBuildReport")
